name: Playwright Prod Tests

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-trigger]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Yekaterinburg
      BASE_URL: https://qaspace.ru
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright with dependencies
        run: npx playwright install --with-deps chromium

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Capture start time
        id: start-time
        run: |
          echo "start_time=$(date '+%H:%M-%d.%m')" >> $GITHUB_OUTPUT
          echo "start_sec=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Run Playwright tests
        run: npx playwright test --project=prod-chromium --workers=2
        env:
          BASE_URL: https://qaspace.ru

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          END_TIME=$(date '+%H:%M-%d.%m')
          DURATION_SEC=$(( ($(date +%s) - ${{ steps.start-time.outputs.start_sec }}) ))
          DURATION_MIN=$(( DURATION_SEC / 60 ))
          DURATION_SEC=$(( DURATION_SEC % 60 ))
          RUN_URL="https://github.com/Gvelet/QASpace-AQA-tests/actions/runs/${{ github.run_id }}"

          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ Тесты прошли"
            EMOJI="✅"
          else
            STATUS="❌ Тесты не прошли"
            EMOJI="❌"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\":\"${TELEGRAM_CHAT_ID}\",
              \"text\":\"${EMOJI} QASpace Prod Tests #${{ github.run_number }}\n🔗 https://qaspace.ru\n\n${STATUS}\n📅 ${{ steps.start-time.outputs.start_time }} - ${END_TIME}\n⏱️ ${DURATION_MIN}м ${DURATION_SEC}с\n\n📁 Детали отчета: ${RUN_URL}\",
              \"disable_web_page_preview\": true
            }"